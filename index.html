<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ArteEducar - Download</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: url('jogs.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: linear-gradient(
        rgba(0,0,0,0.7),
        rgba(0,0,0,0.9)
      );
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .icon {
      width: 80px;
      border-radius: 20px;
    }

    .titulo {
      font-size: 22px;
      font-weight: bold;
    }

    .sub {
      font-size: 14px;
      color: #ccc;
    }

    .btn-instalar {
      margin-top: 15px;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .btn-instalar:hover {
      background: #16a34a;
    }

    .secao {
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 15px;
    }

    .erro {
      margin-top: 20px;
      padding: 10px;
      background: #ef4444;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>

<div class="overlay">

  <!-- TOPO -->
  <div class="header">
    <img class="icon" id="iconApp" src="icon-192.png">
    
    <div>
      <div class="titulo">ArteEducar</div>
      <div class="sub">Educação & Jogos</div>
    </div>
  </div>

  <!-- BOTÃO -->
  <button class="btn-instalar" onclick="baixarAPK()">
    📥 Instalar
  </button>

  <!-- ERRO -->
  <div class="erro" id="erroBox"></div>

  <!-- DESCRIÇÃO -->
  <div class="secao">
    <div class="card">
      <h3>📚 Sobre este app</h3>
      <p>
        Plataforma educativa com jogos, desenho, atividades criativas
        e recursos interativos para crianças.
      </p>
    </div>
  </div>

  <!-- DETALHES -->
  <div class="secao">
    <div class="card">
      <h3>ℹ️ Informações</h3>
      <p>Versão: 1.0</p>
      <p>Tamanho: ~10MB</p>
      <p>Desenvolvedor: Professor Leno</p>
    </div>
  </div>

</div>

<script>
  // 🔍 VERIFICAR IMAGENS
  function verificarImagens() {
    const erroBox = document.getElementById("erroBox");

    const imgFundo = new Image();
    imgFundo.src = "jogs.jpg";

    imgFundo.onerror = () => {
      erroBox.style.display = "block";
      erroBox.innerText = "❌ Erro: imagem de fundo (jogs.jpg) não encontrada.";
    };

    const icon = document.getElementById("iconApp");

    icon.onerror = () => {
      erroBox.style.display = "block";
      erroBox.innerText += "\n❌ Erro: ícone (icon-192.png) não encontrado.";
    };
  }

  // 📥 DOWNLOAD APK
  function baixarAPK() {
    const link = "https://seu-link-do-apk.apk";

    if (link.includes("seu-link")) {
      alert("⚠️ Você ainda não colocou o link do APK.");
      return;
    }

    window.location.href = link;
  }

  // 🚀 EXECUTA AO CARREGAR
  window.onload = verificarImagens;
</script>

</body>
</html>
