<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ArteEducar - Download</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;

      /* FUNDO */
      background: url('https://github.com/lenilsonxavier-dev/arteeducar-loja/blob/main/public/jogs.jpg?raw=true') no-repeat center center fixed;
      background-size: cover;
    }

    /* camada escura para dar contraste */
    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      padding: 20px;
    }

    /* topo estilo Play Store */
    .header {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .icon {
      width: 80px;
      border-radius: 20px;
    }

    .titulo {
      font-size: 22px;
      font-weight: bold;
    }

    .sub {
      font-size: 14px;
      color: #ccc;
    }

    /* botão instalar */
    .btn-instalar {
      margin-top: 15px;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .btn-instalar:hover {
      background: #16a34a;
    }

    /* seção */
    .secao {
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 15px;
    }
  </style>
</head>
<body>

<div class="overlay">

  <!-- TOPO -->
  <div class="header">
    <img class="icon" src="https://github.com/lenilsonxavier-dev/arteeducar-loja/blob/main/public/icon-192.png?raw=true">
    
    <div>
      <div class="titulo">ArteEducar</div>
      <div class="sub">Educação & Jogos</div>
    </div>
  </div>

  <!-- BOTÃO -->
  <button class="btn-instalar" onclick="baixarAPK()">
    📥 Instalar
  </button>

  <!-- DESCRIÇÃO -->
  <div class="secao">
    <div class="card">
      <h3>📚 Sobre este app</h3>
      <p>
        Plataforma educativa com jogos, desenho, atividades criativas
        e recursos interativos para crianças.
      </p>
    </div>
  </div>

  <!-- DETALHES -->
  <div class="secao">
    <div class="card">
      <h3>ℹ️ Informações</h3>
      <p>Versão: 1.0</p>
      <p>Tamanho: ~10MB</p>
      <p>Desenvolvedor: Professor Leno</p>
    </div>
  </div>

</div>

<script>
  function baixarAPK() {
    // 🔗 COLOQUE AQUI O LINK DO SEU APK
    const link = "https://seu-link-do-apk.apk";

    window.location.href = link;
  }
</script>

</body>
</html>
